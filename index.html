<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pick Your Path — Splash Sports</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0A0E1A;
    --card-bg: #141927;
    --card-border: #1E2538;
    --accent: #1BC4CF;
    --conflict: #FF8C00;
    --text: #FFFFFF;
    --text-secondary: #8B9BB4;
    --used-opacity: 0.4;
    --radius-card: 12px;
    --radius-btn: 8px;
    --footer-h: 64px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Inter', BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  #app { min-height: 100vh; }

  /* ── LANDING ───────────────────────────────────────────── */
  .landing {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,210,106,0.08) 0%, transparent 70%);
  }

  .landing-logo {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.18em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 48px;
  }

  .landing-title {
    font-size: clamp(40px, 8vw, 72px);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.05;
    color: var(--text);
    margin-bottom: 24px;
    max-width: 700px;
  }

  .landing-title span { color: var(--accent); }

  .landing-desc {
    font-size: clamp(15px, 2.5vw, 18px);
    color: var(--text-secondary);
    max-width: 520px;
    line-height: 1.65;
    margin-bottom: 40px;
  }

  .btn-cta {
    display: block;
    width: 100%;
    max-width: 360px;
    padding: 18px 32px;
    background: var(--accent);
    color: #0A0E1A;
    font-size: 17px;
    font-weight: 700;
    border: none;
    border-radius: var(--radius-btn);
    cursor: pointer;
    transition: opacity 0.15s, transform 0.15s;
    letter-spacing: 0.01em;
  }

  .btn-cta:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-cta:active { transform: translateY(0); }

  .landing-meta {
    margin-top: 24px;
    font-size: 13px;
    color: var(--text-secondary);
  }

  /* ── PICK SCREEN ───────────────────────────────────────── */
  .pick-screen {
    min-height: 100vh;
    padding-bottom: calc(var(--footer-h) + 16px);
  }

  /* Header */
  .pick-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10, 14, 26, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--card-border);
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 14px 20px;
    gap: 12px;
  }

  .header-logo {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.18em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .header-round {
    font-size: 15px;
    font-weight: 700;
    text-align: center;
    white-space: nowrap;
  }

  .header-progress {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    text-align: right;
    white-space: nowrap;
  }

  /* Round intro */
  .round-intro {
    padding: 24px 20px 8px;
    text-align: center;
  }

  .round-intro h2 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .round-intro p {
    font-size: 13px;
    color: var(--text-secondary);
  }

  /* Matchup grid */
  .matchup-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    padding: 16px 16px;
    max-width: 960px;
    margin: 0 auto;
  }

  @media (max-width: 767px) {
    .matchup-grid { grid-template-columns: 1fr; }
  }

  /* Matchup card */
  .matchup-card {
    background: var(--card-bg);
    border: 1.5px solid var(--card-border);
    border-radius: var(--radius-card);
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .matchup-card.both-used {
    opacity: var(--used-opacity);
    pointer-events: none;
  }

  .card-time {
    padding: 8px 14px 6px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--card-border);
  }

  .team-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    cursor: pointer;
    transition: background 0.18s;
    position: relative;
    min-height: 60px;
  }

  .team-row:hover:not(.used-team) { background: rgba(255,255,255,0.04); }

  .team-row.selected-team {
    background: rgba(0, 210, 106, 0.1);
  }

  .team-row.used-team {
    opacity: var(--used-opacity);
    cursor: not-allowed;
  }

  .team-logo {
    width: 36px;
    height: 36px;
    object-fit: contain;
    flex-shrink: 0;
    border-radius: 4px;
  }

  .team-info { flex: 1; min-width: 0; }

  .team-name {
    font-size: 14px;
    font-weight: 700;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .team-spread {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 1px;
  }

  .team-used-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--conflict);
    margin-top: 2px;
    letter-spacing: 0.04em;
  }

  .check-badge {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.2s;
  }

  .check-badge svg { width: 13px; height: 13px; }

  .team-row.selected-team .check-badge { transform: scale(1.1); }

  .vs-sep {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 14px;
    color: var(--text-secondary);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
  }

  .vs-sep::before, .vs-sep::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--card-border);
  }

  /* Selected card border */
  .matchup-card.has-selection {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 4px 20px rgba(0,210,106,0.12);
  }

  /* ── FOOTER NAV ────────────────────────────────────────── */
  .footer-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: var(--footer-h);
    background: rgba(10, 14, 26, 0.97);
    border-top: 1px solid var(--card-border);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 200;
    display: flex;
    align-items: center;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
    padding: 0 12px;
    gap: 6px;
  }

  .footer-nav::-webkit-scrollbar { display: none; }

  .footer-divider {
    width: 1px;
    height: 24px;
    background: var(--card-border);
    flex-shrink: 0;
    margin: 0 4px;
  }

  .nav-pill {
    flex-shrink: 0;
    padding: 6px 11px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    border: 1.5px solid var(--card-border);
    background: transparent;
    color: var(--text-secondary);
    transition: all 0.15s;
    white-space: nowrap;
    position: relative;
  }

  .nav-pill:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }

  .nav-pill.current {
    background: var(--accent);
    border-color: var(--accent);
    color: #0A0E1A;
  }

  .nav-pill.picked {
    background: #1E2538;
    border-color: #1E2538;
    color: var(--text);
  }

  .nav-pill.conflict {
    border-color: var(--conflict);
    color: var(--conflict);
    background: rgba(255, 140, 0, 0.1);
  }

  .nav-pill .pill-check {
    display: inline-block;
    margin-left: 3px;
    font-size: 9px;
  }

  /* ── SUMMARY ───────────────────────────────────────────── */
  .summary-screen {
    min-height: 100vh;
    padding: 0 0 60px;
  }

  .summary-header {
    text-align: center;
    padding: 48px 24px 32px;
    background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(0,210,106,0.1) 0%, transparent 70%);
  }

  .summary-wordmark {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.18em;
    color: var(--accent);
    margin-bottom: 20px;
  }

  .summary-title {
    font-size: clamp(36px, 7vw, 60px);
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }

  .summary-sub {
    font-size: 16px;
    color: var(--text-secondary);
    max-width: 440px;
    margin: 0 auto;
    line-height: 1.55;
  }

  .summary-body {
    max-width: 640px;
    margin: 0 auto;
    padding: 0 16px;
  }

  .summary-section-label {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.18em;
    color: var(--text-secondary);
    text-transform: uppercase;
    padding: 24px 0 10px;
    border-bottom: 1px solid var(--card-border);
    margin-bottom: 4px;
  }

  .summary-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 13px 0;
    border-bottom: 1px solid rgba(30,37,56,0.6);
  }

  .summary-round-label {
    font-size: 12px;
    color: var(--text-secondary);
    width: 110px;
    flex-shrink: 0;
  }

  .summary-team-logo {
    width: 32px;
    height: 32px;
    object-fit: contain;
    flex-shrink: 0;
  }

  .summary-team-name {
    font-size: 15px;
    font-weight: 700;
    flex: 1;
  }

  .summary-vs {
    font-size: 12px;
    color: var(--text-secondary);
    text-align: right;
    flex-shrink: 0;
  }

  .summary-empty {
    font-size: 13px;
    color: var(--text-secondary);
    font-style: italic;
  }

  .summary-actions {
    max-width: 640px;
    margin: 32px auto 0;
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .btn-share {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: #0A0E1A;
    font-size: 16px;
    font-weight: 700;
    border: none;
    border-radius: var(--radius-btn);
    cursor: pointer;
    transition: opacity 0.15s, transform 0.15s;
  }

  .btn-share:hover { opacity: 0.9; transform: translateY(-1px); }

  .btn-edit-link {
    text-align: center;
    font-size: 14px;
    color: var(--text-secondary);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
    transition: color 0.15s;
  }

  .btn-edit-link:hover { color: var(--text); }

  /* Conflict banner */
  .conflict-banner {
    margin: 12px 16px 0;
    padding: 10px 14px;
    background: rgba(255, 140, 0, 0.12);
    border: 1px solid rgba(255, 140, 0, 0.4);
    border-radius: 8px;
    font-size: 12px;
    color: var(--conflict);
    max-width: 960px;
    margin-left: auto;
    margin-right: auto;
  }

  /* Scroll snap helper for footer */
  .footer-nav { scroll-behavior: smooth; }
</style>
</head>

// STATE
// ═══════════════════════════════════════════════════════════

const state = {
  currentRound: -1,   // -1 = landing, 0-21 = rounds, 22 = summary
  picks: {},          // { roundIndex: 'KC' }
};

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════

function logoUrl(abbr) {
  return `https://a.espncdn.com/i/teamlogos/nfl/500/${abbr.toLowerCase()}.png`;
}

function teamName(abbr) {
  const key = abbr.toLowerCase();
  return TEAMS[key] ? TEAMS[key].name : abbr;
}

// Short team name (city or nickname)
const SHORT_NAMES = {
  kc:'Chiefs', bal:'Ravens', buf:'Bills', cin:'Bengals', cle:'Browns',
  den:'Broncos', hou:'Texans', ind:'Colts', jax:'Jaguars', lac:'Chargers',
  lv:'Raiders', mia:'Dolphins', ne:'Patriots', nyj:'Jets', pit:'Steelers',
  ten:'Titans', ari:'Cardinals', atl:'Falcons', car:'Panthers', chi:'Bears',
  dal:'Cowboys', det:'Lions', gb:'Packers', lar:'Rams', min:'Vikings',
  no:'Saints', nyg:'Giants', phi:'Eagles', sf:'49ers', sea:'Seahawks',
  tb:'Buccaneers', wsh:'Commanders',
};

function shortName(abbr) {
  return SHORT_NAMES[abbr.toLowerCase()] || abbr;
}

// Which rounds (by index) have a conflict?
function conflictRounds() {
  const conflicts = new Set();
  const roundsByTeam = {};
  Object.entries(state.picks).forEach(([ri, abbr]) => {
    const team = abbr.toUpperCase();
    if (!roundsByTeam[team]) roundsByTeam[team] = [];
    roundsByTeam[team].push(Number(ri));
  });
  Object.values(roundsByTeam).forEach(rounds => {
    if (rounds.length > 1) rounds.forEach(r => conflicts.add(r));
  });
  return conflicts;
}

// Returns { roundIndex, roundLabel } or null
function usedInRound(abbr) {
  const team = abbr.toUpperCase();
  const result = [];
  Object.entries(state.picks).forEach(([ri, picked]) => {
    if (picked.toUpperCase() === team) result.push(Number(ri));
  });
  return result;
}

function roundLabel(idx) {
  if (idx < 18) return `Wk ${idx + 1}`;
  const map = { 18: 'WC', 19: 'Div', 20: 'CC', 21: 'SB' };
  return map[idx] || '';
}

function picksCount() {
  return Object.keys(state.picks).length;
}

// ═══════════════════════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════════════════════

function render() {
  const app = document.getElementById('app');
  if (state.currentRound === -1) {
    app.innerHTML = renderLanding();
  } else if (state.currentRound === 22) {
    app.innerHTML = renderSummary();
  } else {
    app.innerHTML = renderPickScreen(state.currentRound);
    // Auto-scroll footer to current pill
    requestAnimationFrame(() => {
      const pill = document.querySelector('.nav-pill.current');
      if (pill) {
        pill.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }
    });
  }
  bindEvents();
}

// ── LANDING ─────────────────────────────────────────────────

function renderLanding() {
  return `
    <div class="landing">
      <div class="landing-logo">SPLASH</div>
      <h1 class="landing-title">Pick Your <span>Path</span></h1>
      <p class="landing-desc">
        Map out your entire NFL season — one pick per week, no repeats, all 22 rounds before
        the first kickoff. Chart your course, lock it in, and watch your path play out.
      </p>
      <button class="btn-cta" data-action="start">Let's Go &rarr;</button>
      <p class="landing-meta">22 rounds &nbsp;&middot;&nbsp; 2025 NFL Season</p>
    </div>
  `;
}

// ── PICK SCREEN ─────────────────────────────────────────────

function renderPickScreen(roundIdx) {
  const round = ROUNDS[roundIdx];
  const conflicts = conflictRounds();
  const made = picksCount();

  return `
    <div class="pick-screen">
      ${renderHeader(round.label, made)}
      ${renderMatchupGrid(roundIdx, round)}
      ${renderFooter(roundIdx, conflicts)}
    </div>
  `;
}

function renderHeader(label, made) {
  return `
    <div class="pick-header">
      <div class="header-logo">SPLASH</div>
      <div class="header-round">${label}</div>
      <div class="header-progress">${made} / 22 picks</div>
    </div>
  `;
}

function renderMatchupGrid(roundIdx, round) {
  const conflictsRounds = conflictRounds();
  let conflictBanner = '';
  if (conflictsRounds.size > 0) {
    const labels = [...conflictsRounds].sort().map(r => ROUNDS[r].short).join(', ');
    conflictBanner = `
      <div class="conflict-banner">
        &#9888; Conflict detected &mdash; the same team is picked in: ${labels}. Tap a round to fix it.
      </div>
    `;
  }

  const cards = round.games.map((game, gi) => renderMatchupCard(roundIdx, gi, game)).join('');

  return `
    <div class="round-intro">
      <h2>${round.label}</h2>
      <p>${round.date}${round.byeTeams ? ` &middot; Bye: ${round.byeTeams.join(', ')}` : ''}</p>
    </div>
    ${conflictBanner}
    <div class="matchup-grid">${cards}</div>
  `;
}

function renderMatchupCard(roundIdx, gameIdx, game) {
  const pickedTeam = state.picks[roundIdx] || null;

  const awayUsedIn = usedInRound(game.away).filter(r => r !== roundIdx);
  const homeUsedIn = usedInRound(game.home).filter(r => r !== roundIdx);

  const awayUsed = awayUsedIn.length > 0;
  const homeUsed = homeUsedIn.length > 0;
  const bothUsed = awayUsed && homeUsed;

  const awaySelected = pickedTeam && pickedTeam.toUpperCase() === game.away.toUpperCase();
  const homeSelected = pickedTeam && pickedTeam.toUpperCase() === game.home.toUpperCase();

  const cardClass = `matchup-card${bothUsed ? ' both-used' : ''}${(awaySelected || homeSelected) ? ' has-selection' : ''}`;

  function usedLabel(usedIn) {
    if (!usedIn.length) return '';
    const labels = usedIn.map(r => roundLabel(r)).join(', ');
    return `<div class="team-used-label">Used ${labels}</div>`;
  }

  function checkBadge() {
    return `<div class="check-badge"><svg viewBox="0 0 13 10" fill="none"><path d="M1.5 5L5 8.5L11.5 1.5" stroke="#0A0E1A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;
  }

  return `
    <div class="${cardClass}">
      <div class="card-time">${game.time}</div>
      <div class="team-row${awaySelected ? ' selected-team' : ''}${awayUsed ? ' used-team' : ''}"
           data-action="pick" data-round="${roundIdx}" data-team="${game.away}"
           ${awayUsed ? '' : ''}>
        <img class="team-logo" src="${logoUrl(game.away)}" alt="${game.away}" onerror="this.style.display='none'" />
        <div class="team-info">
          <div class="team-name">${shortName(game.away)}</div>
          <div class="team-spread">${game.awaySpread}</div>
          ${usedLabel(awayUsedIn)}
        </div>
        ${awaySelected ? checkBadge() : ''}
      </div>
      <div class="vs-sep">@</div>
      <div class="team-row${homeSelected ? ' selected-team' : ''}${homeUsed ? ' used-team' : ''}"
           data-action="pick" data-round="${roundIdx}" data-team="${game.home}"
           ${homeUsed ? '' : ''}>
        <img class="team-logo" src="${logoUrl(game.home)}" alt="${game.home}" onerror="this.style.display='none'" />
        <div class="team-info">
          <div class="team-name">${shortName(game.home)}</div>
          <div class="team-spread">${game.homeSpread}</div>
          ${usedLabel(homeUsedIn)}
        </div>
        ${homeSelected ? checkBadge() : ''}
      </div>
    </div>
  `;
}

function renderFooter(currentIdx, conflicts) {
  const pills = ROUNDS.map((round, i) => {
    const isCurrent = i === currentIdx;
    const hasPick = state.picks[i] !== undefined;
    const isConflict = conflicts.has(i);
    const isPlayoffStart = i === 18;

    let cls = 'nav-pill';
    if (isCurrent) cls += ' current';
    else if (isConflict) cls += ' conflict';
    else if (hasPick) cls += ' picked';

    const check = hasPick && !isCurrent ? '<span class="pill-check">&#10003;</span>' : '';
    const divider = isPlayoffStart ? '<div class="footer-divider"></div>' : '';

    return `${divider}<button class="${cls}" data-action="nav" data-round="${i}">${round.short}${check}</button>`;
  }).join('');

  return `<div class="footer-nav" id="footer-nav">${pills}</div>`;
}

// ── SUMMARY ─────────────────────────────────────────────────

function renderSummary() {
  const regularRows = ROUNDS.slice(0, 18).map((round, i) => renderSummaryRow(i, round)).join('');
  const playoffRows = ROUNDS.slice(18).map((round, i) => renderSummaryRow(i + 18, round)).join('');

  return `
    <div class="summary-screen">
      <div class="summary-header">
        <div class="summary-wordmark">SPLASH</div>
        <h1 class="summary-title">Your Path</h1>
        <p class="summary-sub">Here are all the teams you need to win.</p>
      </div>
      <div class="summary-body">
        <div class="summary-section-label">Regular Season</div>
        ${regularRows}
        <div class="summary-section-label" style="margin-top:12px">Playoffs</div>
        ${playoffRows}
      </div>
      <div class="summary-actions">
        <button class="btn-share" data-action="share">Share My Path</button>
        <button class="btn-edit-link" data-action="edit">&larr; Edit Picks</button>
      </div>
    </div>
  `;
}

function renderSummaryRow(roundIdx, round) {
  const pick = state.picks[roundIdx];
  if (!pick) {
    return `
      <div class="summary-row">
        <div class="summary-round-label">${round.label}</div>
        <span class="summary-empty">No pick made</span>
      </div>
    `;
  }

  // Find opponent
  const pickedGame = round.games.find(g =>
    g.away.toUpperCase() === pick.toUpperCase() || g.home.toUpperCase() === pick.toUpperCase()
  );
  let opponent = '—';
  if (pickedGame) {
    opponent = pickedGame.away.toUpperCase() === pick.toUpperCase()
      ? shortName(pickedGame.home)
      : shortName(pickedGame.away);
  }

  return `
    <div class="summary-row">
      <div class="summary-round-label">${round.label}</div>
      <img class="summary-team-logo" src="${logoUrl(pick)}" alt="${pick}" onerror="this.style.display='none'" />
      <div class="summary-team-name">${shortName(pick)}</div>
      <div class="summary-vs">vs. ${opponent}</div>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════
// EVENT BINDING
// ═══════════════════════════════════════════════════════════

function bindEvents() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', handleAction);
  });
}

function handleAction(e) {
  const el = e.currentTarget;
  const action = el.dataset.action;

  if (action === 'start') {
    state.currentRound = 0;
    render();
  }

  else if (action === 'pick') {
    const roundIdx = Number(el.dataset.round);
    const team = el.dataset.team;

    // If clicking an already-used team (used in another round), do nothing
    const usedIn = usedInRound(team).filter(r => r !== roundIdx);
    if (usedIn.length > 0) return;

    // Toggle off if re-clicking same team
    if (state.picks[roundIdx] && state.picks[roundIdx].toUpperCase() === team.toUpperCase()) {
      delete state.picks[roundIdx];
      render();
      return;
    }

    state.picks[roundIdx] = team.toUpperCase();
    render();

    // Auto-advance after 400ms
    setTimeout(() => {
      const nextRound = roundIdx + 1;
      if (nextRound <= 21) {
        state.currentRound = nextRound;
      } else {
        state.currentRound = 22; // summary
      }
      render();
    }, 400);
  }

  else if (action === 'nav') {
    const roundIdx = Number(el.dataset.round);
    state.currentRound = roundIdx;
    render();
  }

  else if (action === 'share') {
    alert('🏈 Your path has been locked in! Share feature coming soon.');
  }

  else if (action === 'edit') {
    // Go to last round with a pick, or round 0
    let lastPicked = 0;
    Object.keys(state.picks).forEach(ri => {
      if (Number(ri) > lastPicked) lastPicked = Number(ri);
    });
    state.currentRound = lastPicked;
    render();
  }
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════

render();
</script>
</body>
</html>
